<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZANCUDO DIVISION | UCMJ FULL DATABASE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=JetBrains+Mono&display=swap');
        body { background: #05070a; color: #e2e8f0; font-family: 'JetBrains Mono', monospace; }
        .font-mil { font-family: 'Orbitron', sans-serif; }
        .ucmj-card { border-left: 3px solid #b45309; background: rgba(15, 23, 42, 0.6); transition: 0.2s; cursor: pointer; margin-bottom: 0.5rem; }
        .ucmj-card:hover { background: rgba(180, 83, 9, 0.1); border-left-width: 8px; }
        .content-hidden { display: none; }
        .section-title { color: #b45309; border-bottom: 1px solid #b45309; margin: 2rem 0 1rem 0; padding-bottom: 0.5rem; font-size: 0.8rem; font-weight: bold; }
    </style>
</head>
<body class="min-h-screen">

    <header class="border-b border-amber-900/30 bg-black/80 p-6 sticky top-0 z-50 backdrop-blur-md">
        <div class="container mx-auto flex flex-col md:flex-row justify-between items-center">
            <div>
                <h1 class="font-mil text-3xl text-amber-600 tracking-tighter italic">ZANCUDO DIVISION</h1>
                <p class="text-[10px] text-amber-900 font-bold uppercase tracking-[0.5em]">UCMJ FULL ARCHIVE / SECURE</p>
            </div>
            <div class="mt-4 md:mt-0 relative">
                <input type="text" id="search" placeholder="RECHERCHER UN ARTICLE OU UN MOT..." 
                       class="bg-black border border-amber-900/50 rounded-none py-2 px-10 text-amber-500 focus:border-amber-500 outline-none w-80 text-xs">
                <i class="fas fa-search absolute left-3 top-3 text-amber-900/50 text-xs"></i>
            </div>
        </div>
    </header>

    <main class="container mx-auto py-10 px-6">
        <div id="articles-list">
            </div>
    </main>

    <script>
        const ucmjData = [
            // PART I TO IX (PROCEDURE)
            { id: 1, s: "GENERAL", t: "Definitions", d: "Termes officiels : Officier, Juge-Avocat, Accusateur." },
            { id: 2, s: "GENERAL", t: "Persons Subject to this Chapter", d: "Militaires actifs, réservistes, prisonniers de guerre." },
            { id: 3, s: "GENERAL", t: "Jurisdiction to Try Certain Persons", d: "Compétence après la fin de service." },
            { id: 5, s: "GENERAL", t: "Territorial Applicability", d: "S'applique partout dans le monde." },
            { id: 7, s: "APPREHENSION", t: "Apprehension", d: "Pouvoir d'arrestation des suspects." },
            { id: 15, s: "NJP", t: "Non-Judicial Punishment", d: "Sanctions administratives (Article 15)." },
            { id: 16, s: "COURTS", t: "Courts-martial classified", d: "Types de tribunaux : General, Special, Summary." },

            // PART X - PUNITIVE ARTICLES (77-134)
            { id: 77, s: "PUNITIVE", t: "Principals", d: "Responsabilité des auteurs et complices." },
            { id: 78, s: "PUNITIVE", t: "Accessory after the fact", d: "Complicité après les faits." },
            { id: 80, s: "PUNITIVE", t: "Attempts", d: "Tentatives d'infractions." },
            { id: 81, s: "PUNITIVE", t: "Conspiracy", d: "Complot entre deux personnes ou plus." },
            { id: 82, s: "PUNITIVE", t: "Solicitation", d: "Incitation à la désertion ou mutinerie." },
            { id: 83, s: "PUNITIVE", t: "Fraudulent enlistment", d: "Engagement par tromperie." },
            { id: 85, s: "PUNITIVE", t: "Desertion", d: "Abandon définitif de l'unité." },
            { id: 86, s: "PUNITIVE", t: "AWOL", d: "Absence sans permission / Manque à l'appel." },
            { id: 87, s: "PUNITIVE", t: "Missing movement", d: "Manquer le départ d'un navire ou avion." },
            { id: 88, s: "PUNITIVE", t: "Contempt toward officials", d: "Mépris envers les élus civils." },
            { id: 89, s: "PUNITIVE", t: "Disrespect toward superior officer", d: "Manque de respect envers un officier." },
            { id: 90, s: "PUNITIVE", t: "Assault / Disobeying officer", d: "Agression ou désobéissance volontaire." },
            { id: 91, s: "PUNITIVE", t: "Insubordinate conduct", d: "Insubordination envers un NCO ou adjudant." },
            { id: 92, s: "PUNITIVE", t: "Failure to obey order", d: "Violation de règlement ou dérive de fonction." },
            { id: 93, s: "PUNITIVE", t: "Cruelty and maltreatment", d: "Mauvais traitements envers subordonnés." },
            { id: 94, s: "PUNITIVE", t: "Mutiny or sedition", d: "Révolte collective contre l'autorité." },
            { id: 95, s: "PUNITIVE", t: "Resistance / Breach of arrest", d: "Évasion ou résistance lors d'une arrestation." },
            { id: 99, s: "PUNITIVE", t: "Misbehavior before the enemy", d: "Lâcheté ou faute grave au combat." },
            { id: 104, s: "PUNITIVE", t: "Aiding the enemy", d: "Assistance directe à l'ennemi." },
            { id: 106, s: "PUNITIVE", t: "Spies", d: "Espionnage (Temps de guerre)." },
            { id: 107, s: "PUNITIVE", t: "False official statements", d: "Mensonges dans les rapports officiels." },
            { id: 108, s: "PUNITIVE", t: "Loss / Damage military property", d: "Vente ou destruction de matériel militaire." },
            { id: 109, s: "PUNITIVE", t: "Waste / Destruction of other property", d: "Dommages aux biens civils." },
            { id: 111, s: "PUNITIVE", t: "Drunken or reckless operation", d: "Conduite dangereuse de véhicules." },
            { id: 112, s: "PUNITIVE", t: "Drunk on duty", d: "Ivresse en service." },
            { id: 112, t: "Controlled substances", d: "Usage ou trafic de drogues." },
            { id: 113, s: "PUNITIVE", t: "Misbehavior of sentinel", d: "Sentinelle endormie ou ivre." },
            { id: 115, s: "PUNITIVE", t: "Malingering", d: "Feindre une maladie pour éviter le service." },
            { id: 116, s: "PUNITIVE", t: "Riot or breach of peace", d: "Participation à une émeute." },
            { id: 117, s: "PUNITIVE", t: "Provoking speeches", d: "Gestes ou paroles provocatrices." },
            { id: 118, s: "PUNITIVE", t: "Murder", d: "Homicide volontaire." },
            { id: 119, s: "PUNITIVE", t: "Manslaughter", d: "Homicide involontaire." },
            { id: 120, s: "PUNITIVE", t: "Rape / Sexual assault", d: "Viol et agressions sexuelles." },
            { id: 121, s: "PUNITIVE", t: "Larceny", d: "Vol et détournement de biens." },
            { id: 122, s: "PUNITIVE", t: "Robbery", d: "Vol avec violence." },
            { id: 123, s: "PUNITIVE", t: "Forgery", d: "Faux et usage de faux." },
            { id: 128, s: "PUNITIVE", t: "Assault", d: "Agression ou tentative d'agression." },
            { id: 129, s: "PUNITIVE", t: "Burglary", d: "Cambriolage." },
            { id: 131, s: "PUNITIVE", t: "Perjury", d: "Faux témoignage sous serment." },
            { id: 132, s: "PUNITIVE", t: "Fraud against the US", d: "Fraude contre le gouvernement." },
            { id: 133, s: "PUNITIVE", t: "Conduct unbecoming an officer", d: "Conduite indigne d'un officier." },
            { id: 134, s: "PUNITIVE", t: "General Article", d: "Désordres nuisant à la discipline." },

            // PART XI - MISC
            { id: 135, s: "MISC", t: "Courts of inquiry", d: "Mise en place de commissions d'enquête." },
            { id: 137, s: "MISC", t: "Articles to be explained", d: "Obligation d'expliquer le code aux soldats." },
            { id: 138, s: "MISC", t: "Complaints of wrongs", d: "Droit de recours contre un supérieur." }
        ];

        const list = document.getElementById('articles-list');
        const searchInput = document.getElementById('search');

        function render(data) {
            list.innerHTML = '';
            let currentSec = "";
            data.forEach(a => {
                if(a.s !== currentSec) {
                    const sec = document.createElement('div');
                    sec.className = "section-title font-mil";
                    sec.innerText = `CHAPTER // ${a.s}`;
                    list.appendChild(sec);
                    currentSec = a.s;
                }
                const card = document.createElement('div');
                card.className = "ucmj-card p-4 rounded-sm shadow-xl";
                card.onclick = () => card.querySelector('.desc').classList.toggle('content-hidden');
                card.innerHTML = `
                    <div class="flex justify-between items-center text-xs md:text-sm">
                        <div class="flex items-center gap-4">
                            <span class="font-mil text-amber-600">#${a.id}</span>
                            <h2 class="font-bold uppercase tracking-widest">${a.t}</h2>
                        </div>
                        <i class="fas fa-plus text-amber-900"></i>
                    </div>
                    <div class="desc content-hidden mt-4 pt-4 border-t border-amber-900/10 text-slate-400 text-xs italic leading-relaxed">
                        "${a.d}"
                    </div>
                `;
                list.appendChild(card);
            });
        }

        searchInput.addEventListener('input', (e) => {
            const v = e.target.value.toLowerCase();
            const f = ucmjData.filter(x => x.t.toLowerCase().includes(v) || x.id.toString().includes(v) || x.d.toLowerCase().includes(v));
            render(f);
        });

        render(ucmjData);
    </script>
</body>
</html>
