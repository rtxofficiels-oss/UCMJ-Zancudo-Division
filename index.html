<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UCMJ | OMNI-ARCHIVE | ZANCUDO DIVISION</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;900&family=JetBrains+Mono&display=swap');
        body { background: #000000; color: #a1a1aa; font-family: 'Inter', sans-serif; }
        .font-mono { font-family: 'JetBrains Mono', monospace; }
        .article-card { background: #09090b; border: 1px solid #18181b; transition: all 0.3s ease; border-radius: 4px; }
        .article-card:hover { border-color: #3b82f6; background: #0c0c0e; box-shadow: 0 0 25px rgba(59, 130, 246, 0.15); }
        .category-tag { font-size: 9px; text-transform: uppercase; letter-spacing: 1px; padding: 2px 8px; background: #1e1b4b; color: #818cf8; border-radius: 2px; font-weight: bold; }
        .content-hidden { display: none; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: #000; }
        ::-webkit-scrollbar-thumb { background: #27272a; border-radius: 10px; }
    </style>
</head>
<body class="min-h-screen">

    <header class="p-8 border-b border-zinc-900 bg-black/90 backdrop-blur-md sticky top-0 z-50">
        <div class="container mx-auto flex flex-col md:flex-row justify-between items-center gap-6">
            <div class="flex items-center gap-4">
                <div class="h-12 w-1 bg-blue-600 shadow-[0_0_10px_#2563eb]"></div>
                <div>
                    <h1 class="text-2xl font-black tracking-tighter text-white uppercase italic">Zancudo Division</h1>
                    <p class="font-mono text-[10px] text-blue-500 uppercase tracking-widest leading-none">UCMJ Omniscience • Terminal v3.5</p>
                </div>
            </div>
            <div class="relative w-full max-w-2xl">
                <i class="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-zinc-600"></i>
                <input type="text" id="search" placeholder="NUMÉRO, MOT-CLÉ OU CATÉGORIE..." 
                       class="w-full bg-zinc-950 border border-zinc-800 rounded-sm py-4 px-12 text-sm text-white focus:border-blue-600 outline-none transition-all">
            </div>
        </div>
    </header>

    <main class="container mx-auto py-12 px-6 max-w-6xl">
        <div id="articles-container" class="grid gap-4"></div>
    </main>

    <script>
        const ucmjDatabase = [
            // BLOC 1-15 (PROCÉDURE)
            { id: 1, cat: "Général", t: "Définitions", d: "Explication technique des rôles : Juge-Avocat (JAG), Officier Supérieur, Personnel Enrôlé." },
            { id: 2, cat: "Général", t: "Juridiction des Personnes", d: "Liste exhaustive des individus sous juridiction UCMJ, incluant les civils accompagnant les forces en temps de guerre." },
            { id: 7, cat: "Force", t: "Appréhension", d: "Cadre légal de l'arrestation. Définit la 'cause probable' nécessaire pour priver un membre de sa liberté." },
            { id: 15, cat: "Sanction", t: "Article 15 (NJP)", d: "Sanctions non-judiciaires permettant de maintenir la discipline sans casier judiciaire permanent." },

            // BLOC 77-94 (INSUBORDINATION & ORDRES)
            { id: 77, cat: "Responsabilité", t: "Auteurs principaux", d: "Toute personne qui aide, conseille ou commande un crime est traitée comme l'exécuteur." },
            { id: 78, cat: "Responsabilité", t: "Complice après les faits", d: "Toute assistance pour éviter la capture ou la punition d'un auteur de crime." },
            { id: 81, cat: "Complot", t: "Conspiration", d: "Accord entre deux personnes ou plus pour commettre un acte illégal." },
            { id: 85, cat: "Désertion", t: "Désertion", d: "Abandon définitif ou pour éviter un devoir important (déploiement, combat)." },
            { id: 86, cat: "Absence", t: "AWOL", d: "Absence sans autorisation officielle d'un lieu de service désigné." },
            { id: 89, cat: "Insubordination", t: "Irrespect envers Officier", d: "Paroles, gestes ou mépris affiché envers la hiérarchie." },
            { id: 90, cat: "Insubordination", t: "Agression d'un Supérieur", d: "Frapper un officier supérieur ou désobéissance volontaire à un ordre légal." },
            { id: 92, cat: "Ordres", t: "Violation d'Ordre Général", d: "Manquement à une consigne écrite permanente ou à un règlement de base." },
            { id: 94, cat: "Mutinerie", t: "Mutinerie / Sédition", d: "Refus collectif d'obéir ou tentative de renverser l'autorité militaire." },

            // BLOC 95-110 (CRIMES DE GUERRE & COMBAT)
            { id: 99, cat: "Combat", t: "Mauvaise conduite au combat", d: "Lâcheté, abandon de munitions ou de l'unité face à l'ennemi." },
            { id: 101, cat: "Sécurité", t: "Usage de signaux / Codes", d: "Divulgation ou altération des mots de passe et codes de chiffrement." },
            { id: 103, cat: "Guerre", t: "Biens capturés / Pillage", d: "Interdiction de s'approprier des butins de guerre pour un profit personnel." },
            { id: 103a, cat: "Guerre", t: "Espionnage", d: "Collecte de données pour une puissance étrangère (passible de mort selon les cas)." },
            { id: 104, cat: "Trahison", t: "Aide à l'ennemi", d: "Soutien logistique, financier ou informationnel direct à l'adversaire." },
            { id: 105, cat: "Captivité", t: "Inconduite en tant que prisonnier", d: "Traiter cruellement ses camarades de cellule pour obtenir des faveurs de l'ennemi." },
            { id: 106, cat: "Guerre", t: "Crimes de Guerre", d: "Violations graves des conventions internationales lors d'opérations armées." },

            // BLOC 107-123 (FRAUDE & FALSIFICATION)
            { id: 107, cat: "Mensonge", t: "Fausse déclaration officielle", d: "Mensonge écrit ou oral dans l'exercice des fonctions." },
            { id: 108, cat: "Matériel", t: "Perte / Sabotage", d: "Destruction volontaire ou négligente de la propriété militaire." },
            { id: 111, cat: "Véhicule", t: "Conduite avec facultés affaiblies", d: "Alcoolémie ou stupéfiants au contrôle d'un véhicule ou engin de guerre." },
            { id: 112a, cat: "Drogue", t: "Substances contrôlées", d: "Possession, distribution ou usage de narcotiques (Héroïne, Cocaine, etc.)." },
            { id: 113, cat: "Garde", t: "Manquement de Sentinelle", d: "S'endormir à son poste ou le quitter avant d'être relevé." },
            { id: 118, cat: "Crime Sang", t: "Meurtre", d: "Homicide volontaire avec préméditation ou intention de nuire gravement." },
            { id: 121, cat: "Vol", t: "Larceny", d: "Soustraction de propriété gouvernementale ou privée." },
            { id: 122, cat: "Vol", t: "Braquage (Robbery)", d: "Vol avec usage de la force physique ou de la menace." },
            { id: 123, cat: "Fraude", t: "Falsification", d: "Altérer sciemment des documents légaux, signatures ou ordres officiels." },
            { id: 123a, cat: "Fraude", t: "Chèques sans provision", d: "Usage frauduleux d'instruments financiers." },

            // BLOC 124-134 (VIOLENCE & GÉNÉRAL)
            { id: 128, cat: "Violence", t: "Assault (Agression)", d: "Tentative ou exécution de violence physique contre autrui." },
            { id: 131, cat: "Justice", t: "Parjure", d: "Mentir délibérément sous serment devant une cour martiale." },
            { id: 131b, cat: "Justice", t: "Obstruction à la justice", d: "Influencer un témoin ou détruire des preuves d'enquête." },
            { id: 132, cat: "Fraude", t: "Falsification de réclamations", d: "Fraude aux indemnités ou aux salaires gouvernementaux." },
            { id: 133, cat: "Honneur", t: "Conduite d'Officier", d: "Actes déshonorants pour un officier et un gentleman." },
            { id: 134, cat: "Général", t: "Article Général", d: "Désordres non spécifiés : Adultère, dettes, comportement nuisant à l'image des forces." },

            // RAJOUTS RÉCENTS (ADMIN & RECOURS)
            { id: 138, cat: "Recours", t: "Plainte contre Supérieur", d: "Droit légal de signaler un acte injuste commis par un commandant." },
            { id: 139, cat: "Civil", t: "Dommages aux civils", d: "Procédure de saisie sur solde pour réparer des dégâts causés aux biens civils." },
            { id: 146, cat: "Général", t: "Clause de Sévérité", d: "Application stricte des peines maximales en temps de guerre." }
        ];

        const container = document.getElementById('articles-container');
        const searchInput = document.getElementById('search');

        function render(data) {
            container.innerHTML = '';
            data.forEach(a => {
                const card = document.createElement('div');
                card.className = "article-card p-5 cursor-pointer flex flex-col gap-4";
                card.onclick = () => card.querySelector('.details').classList.toggle('content-hidden');

                card.innerHTML = `
                    <div class="flex flex-col md:flex-row justify-between md:items-center gap-4">
                        <div class="flex items-center gap-5">
                            <span class="font-mono text-blue-500 font-bold text-lg opacity-80">#${a.id}</span>
                            <div>
                                <h3 class="text-white font-bold uppercase tracking-widest text-sm">${a.t}</h3>
                                <div class="flex items-center gap-2 mt-1">
                                    <span class="category-tag">${a.cat}</span>
                                    <span class="text-[9px] text-zinc-600 font-mono tracking-tighter uppercase">Secured File // Div Z</span>
                                </div>
                            </div>
                        </div>
                        <div class="text-zinc-700 text-[10px] uppercase font-bold flex items-center gap-2">
                            <span>Dossier</span>
                            <i class="fas fa-chevron-down"></i>
                        </div>
                    </div>
                    <div class="details content-hidden pt-6 border-t border-zinc-900">
                        <p class="text-zinc-400 text-sm leading-relaxed italic border-l-2 border-blue-600 pl-4">
                            "${a.d}"
                        </p>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        searchInput.addEventListener('input', (e) => {
            const v = e.target.value.toLowerCase();
            const f = ucmjDatabase.filter(x => 
                x.t.toLowerCase().includes(v) || x.id.toString().includes(v) || x.cat.toLowerCase().includes(v)
            );
            render(f);
        });

        render(ucmjDatabase);
    </script>
</body>
</html>
