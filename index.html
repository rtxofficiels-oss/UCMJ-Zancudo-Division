<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UCMJ | FULL MASTER ARCHIVE | ZANCUDO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;900&family=JetBrains+Mono&display=swap');
        body { background: #000000; color: #a1a1aa; font-family: 'Inter', sans-serif; margin: 0; }
        .font-mono { font-family: 'JetBrains Mono', monospace; }
        .article-card { background: #09090b; border: 1px solid #18181b; transition: all 0.3s ease; border-radius: 4px; margin-bottom: 12px; padding: 20px; cursor: pointer; }
        .article-card:hover { border-color: #3b82f6; background: #0c0c0e; box-shadow: 0 0 25px rgba(59, 130, 246, 0.15); }
        .category-tag { font-size: 9px; text-transform: uppercase; letter-spacing: 1px; padding: 2px 8px; background: #1e1b4b; color: #818cf8; border-radius: 2px; font-weight: bold; }
        .details { margin-top: 15px; padding-top: 15px; border-top: 1px solid #18181b; color: #d4d4d8; display: none; line-height: 1.6; }
        .details.show { display: block; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: #000; }
        ::-webkit-scrollbar-thumb { background: #2563eb; }
    </style>
</head>
<body class="min-h-screen">

    <header class="p-8 border-b border-zinc-900 bg-black/90 backdrop-blur-md sticky top-0 z-50">
        <div class="container mx-auto flex flex-col md:flex-row justify-between items-center gap-6">
            <div class="flex items-center gap-4">
                <div style="height: 45px; width: 4px; background: #2563eb; box-shadow: 0 0 15px #2563eb;"></div>
                <div>
                    <h1 class="text-2xl font-black tracking-tighter text-white uppercase italic">Zancudo Division</h1>
                    <p class="font-mono text-[10px] text-blue-500 uppercase tracking-widest leading-none">UCMJ Registry • Full Access Granted</p>
                </div>
            </div>
            <div class="relative w-full max-w-2xl">
                <i class="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-zinc-600"></i>
                <input type="text" id="search" placeholder="FILTRER LES ARTICLES..." 
                       class="w-full bg-zinc-950 border border-zinc-800 rounded-sm py-4 px-12 text-sm text-white focus:border-blue-600 outline-none transition-all">
            </div>
        </div>
    </header>

    <main class="container mx-auto py-12 px-6 max-w-6xl">
        <div id="articles-container"></div>
    </main>

    <script>
        const ucmjDatabase = [
            // PARTIE 1 : GÉNÉRALITÉS ET PROCÉDURES
            { id: 1, cat: "Général", t: "Définitions", d: "Établit les définitions légales pour les termes 'officier', 'juge-avocat', 'accusateur' et 'personnel enrôlé'." },
            { id: 2, cat: "Général", t: "Juridiction", d: "Définit les personnes soumises à l'UCMJ : service actif, réservistes, retraités, prisonniers de guerre et civils en zone de combat." },
            { id: 7, cat: "Force", t: "Appréhension", d: "Autorité légale pour arrêter un individu suspecté d'une infraction militaire sous 'cause probable'." },
            { id: 8, cat: "Force", t: "Arrestation de déserteurs", d: "Délégation aux autorités civiles pour capturer et détenir les déserteurs de l'armée." },
            { id: 9, cat: "Restriction", t: "Confinement et Restriction", d: "Procédure d'imposition de limites physiques ou de mise en cellule avant le procès." },
            { id: 13, cat: "Droit", t: "Punition pré-procès", d: "Interdiction de punir ou d'humilier un suspect avant son jugement définitif par une cour martiale." },
            { id: 15, cat: "Sanction", t: "Article 15 (NJP)", d: "Punitions non-judiciaires administrées par le commandement pour des infractions mineures sans procès." },

            // PARTIE 2 : ARTICLES PUNITIFS (LA LISTE NOIRE)
            { id: 77, cat: "Responsabilité", t: "Auteurs principaux", d: "Toute personne qui commet, aide, ordonne ou conseille un crime est tenue pour responsable au même titre que l'exécuteur." },
            { id: 78, cat: "Responsabilité", t: "Complice après les faits", d: "Assistance volontaire fournie à un criminel pour entraver sa capture, son procès ou sa punition." },
            { id: 80, cat: "Tentative", t: "Tentative", d: "Acte concret entrepris avec l'intention de commettre un crime, même si celui-ci n'est pas mené à son terme." },
            { id: 81, cat: "Complot", t: "Conspiration", d: "Accord entre deux personnes ou plus pour commettre un crime, suivi d'un acte extérieur pour le réaliser." },
            { id: 82, cat: "Incitations", t: "Sollicitation", d: "Le fait de commander, demander ou inciter autrui à déserter, à se mutiner ou à commettre une sédition." },
            { id: 83, cat: "Fraude", t: "Engagement Frauduleux", d: "Obtenir un enrôlement ou une nomination par des déclarations sciemment fausses ou par dissimulation." },
            { id: 85, cat: "Désertion", t: "Désertion", d: "Abandonner son unité avec l'intention de ne pas revenir, ou fuir pour éviter un service important ou périlleux." },
            { id: 86, cat: "Absence", t: "AWOL (Absence sans congé)", d: "Manquement à se présenter à son poste ou départ d'une unité sans autorisation officielle." },
            { id: 87, cat: "Absence", t: "Manquement au mouvement", d: "Manquer délibérément ou par négligence le départ d'un navire, avion ou convoi militaire." },
            { id: 88, cat: "Politique", t: "Mépris des officiels", d: "Utilisation de paroles méprisantes envers le Président, le Congrès ou les secrétaires d'État." },
            { id: 89, cat: "Insubordination", t: "Irrespect envers Officier", d: "Comportement insultant, gestes déplacés ou paroles irrespectueuses envers un officier supérieur." },
            { id: 90, cat: "Insubordination", t: "Agression/Désobéissance", d: "Frapper un officier supérieur ou désobéir volontairement à un ordre légal et direct." },
            { id: 91, cat: "Insubordination", t: "Insubordination NCO", d: "Refus d'obéissance ou comportement méprisant envers un sous-officier ou un adjudant." },
            { id: 92, cat: "Ordres", t: "Violation d'Ordre", d: "Infraction consistant à ne pas obéir à un règlement général, un ordre permanent ou à manquer à ses devoirs." },
            { id: 93, cat: "Abus", t: "Cruauté et Mauvais traitements", d: "Abus d'autorité, oppression ou cruauté physique/mentale exercée sur un subordonné." },
            { id: 94, cat: "Mutinerie", t: "Mutinerie et Sédition", d: "Révolte collective armée ou refus groupé d'obéir à l'autorité militaire." },
            { id: 95, cat: "Évasion", t: "Résistance à l'arrestation", d: "Opposition physique lors d'une interpellation ou évasion d'une zone de garde à vue." },
            { id: 99, cat: "Combat", t: "Lâcheté au combat", d: "Mauvaise conduite, fuite, ou abandon d'armes et de munitions devant l'adversaire." },
            { id: 101, cat: "Sécurité", t: "Divulgation de Codes", d: "Trahison ou usage illégal de mots de passe, signaux et codes de chiffrement." },
            { id: 104, cat: "Trahison", t: "Aide à l'ennemi", d: "Donner des renseignements, des vivres ou un soutien logistique à une force adverse." },
            { id: 106, cat: "Guerre", t: "Espionnage", d: "Collecte secrète d'informations stratégiques au profit d'une puissance étrangère." },
            { id: 107, cat: "Mensonge", t: "Fausse déclaration officielle", d: "Signer un faux document ou mentir lors d'une déclaration officielle avec intention de tromper." },
            { id: 108, cat: "Matériel", t: "Sabotage / Perte de biens", d: "Vendre, endommager ou perdre par négligence du matériel appartenant au gouvernement." },
            { id: 109, cat: "Matériel", t: "Destruction biens privés", d: "Détérioration volontaire ou pillage de biens appartenant à des civils." },
            { id: 111, cat: "Véhicule", t: "Ivresse au volant", d: "Opérer un véhicule, navire ou aéronef avec des facultés affaiblies par l'alcool ou la drogue." },
            { id: 112, cat: "Service", t: "Ivresse au service", d: "Être ivre ou sous l'emprise de stupéfiants lors d'un tour de garde ou d'une mission." },
            { id: 112a, cat: "Drogue", t: "Stupéfiants", d: "Possession, distribution, fabrication ou usage de drogues illicites (cocaïne, héroïne, marijuana, etc.)." },
            { id: 113, cat: "Garde", t: "Faute de Sentinelle", d: "Sentinelle trouvée endormie, ivre ou ayant quitté son poste sans être relevée." },
            { id: 118, cat: "Crime Sang", t: "Meurtre", d: "Homicide volontaire prémédité ou intention d'infliger des blessures mortelles." },
            { id: 121, cat: "Vol", t: "Larceny (Vol simple)", d: "Soustraction illégale de propriété avec intention d'en priver le propriétaire." },
            { id: 122, cat: "Vol", t: "Braquage (Robbery)", d: "Vol commis par la force ou par intimidation en présence de la victime." },
            { id: 123, cat: "Fraude", t: "Falsification (Forgery)", d: "Création ou altération de documents officiels ou signatures pour frauder." },
            { id: 123a, cat: "Fraude", t: "Chèques sans provision", d: "Émission de chèques frauduleux en sachant que les fonds sont insuffisants." },
            { id: 128, cat: "Violence", t: "Assault (Agression)", d: "Tentative d'infliger une violence corporelle ou exécution de coups et blessures." },
            { id: 131, cat: "Justice", t: "Parjure", d: "Faire sciemment une fausse déclaration sous serment lors d'une procédure judiciaire." },
            { id: 131a, cat: "Justice", t: "Subornation de parjure", d: "Inciter ou forcer une autre personne à commettre un parjure." },
            { id: 131b, cat: "Justice", t: "Obstruction à la justice", d: "Entraver une enquête, influencer un témoin ou détruire des preuves physiques." },
            { id: 132, cat: "Fraude", t: "Fraude gouvernementale", d: "Falsification de réclamations de paiement ou d'indemnités militaires." },
            { id: 133, cat: "Honneur", t: "Conduite d'Officier", d: "Actes déshonorants qui ternissent le statut d'officier et de gentleman." },
            { id: 134, cat: "Général", t: "Article Général", d: "Désordres non listés : Adultère, dettes, comportement nuisant à la discipline ou au bon ordre." },
            { id: 138, cat: "Recours", t: "Plainte pour tort", d: "Procédure permettant de signaler officiellement un grief contre un commandant." }
        ];

        const container = document.getElementById('articles-container');
        const searchInput = document.getElementById('search');

        function render(data) {
            container.innerHTML = '';
            data.forEach(a => {
                const card = document.createElement('div');
                card.className = "article-card";
                card.innerHTML = `
                    <div class="flex justify-between items-center">
                        <div class="flex items-center gap-5">
                            <span class="font-mono text-blue-500 font-bold text-lg">#${a.id}</span>
                            <div>
                                <h3 class="text-white font-bold uppercase tracking-widest text-sm">${a.t}</h3>
                                <span class="category-tag mt-1 inline-block">${a.cat}</span>
                            </div>
                        </div>
                        <i class="fas fa-chevron-down text-zinc-700"></i>
                    </div>
                    <div class="details">
                        <p class="italic">"${a.d}"</p>
                        <div class="mt-4 flex gap-2">
                            <span style="font-size:8px;" class="text-zinc-600 border border-zinc-800 px-2 py-1 uppercase">Zancudo Restricted File</span>
                        </div>
                    </div>
                `;
                card.onclick = () => {
                    const d = card.querySelector('.details');
                    d.classList.toggle('show');
                };
                container.appendChild(card);
            });
        }

        searchInput.oninput = (e) => {
            const val = e.target.value.toLowerCase();
            const filtered = ucmjDatabase.filter(x => 
                x.t.toLowerCase().includes(val) || 
                x.id.toString().includes(val) || 
                x.cat.toLowerCase().includes(val)
            );
            render(filtered);
        };

        render(ucmjDatabase);
    </script>
</body>
</html>
