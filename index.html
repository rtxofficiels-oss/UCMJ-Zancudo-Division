<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>UCMJ | MASTER DATABASE | ZANCUDO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=JetBrains+Mono&display=swap');
        body { background-color: #000000; color: #a1a1aa; font-family: 'Inter', sans-serif; margin: 0; }
        .article-card { background: #0a0a0a; border: 1px solid #1a1a1a; padding: 20px; margin-bottom: 10px; cursor: pointer; border-radius: 4px; }
        .article-card:hover { border-color: #2563eb; background: #0f172a; }
        .details { display: none; margin-top: 15px; padding-top: 15px; border-top: 1px solid #1e293b; color: #d1d5db; }
        .details.active { display: block; }
        .status-bar { height: 4px; background: #2563eb; box-shadow: 0 0 10px #2563eb; width: 40px; }
    </style>
</head>
<body>

    <header class="p-6 border-b border-zinc-900 sticky top-0 bg-black/90 backdrop-blur-sm z-50">
        <div class="container mx-auto flex justify-between items-center">
            <div class="flex items-center gap-4">
                <div class="status-bar"></div>
                <div>
                    <h1 class="text-xl font-black text-white uppercase italic tracking-tighter">Zancudo Division</h1>
                    <p class="text-[9px] font-mono text-blue-500 tracking-widest uppercase">UCMJ Master Database v5.0</p>
                </div>
            </div>
            <input type="text" id="search" placeholder="RECHERCHER UN ARTICLE..." 
                   class="bg-zinc-900 border border-zinc-800 text-white text-sm px-4 py-2 w-64 outline-none focus:border-blue-600">
        </div>
    </header>

    <main class="container mx-auto p-6 max-w-5xl">
        <div id="articles-list">
            </div>
    </main>

    <script>

            { id: 2, cat: "Général", t: "Juridiction", d: "Personnes soumises au code (Actifs, Réservistes, Civils en guerre)." },

            { id: 8, cat: "Force", t: "Arrestation de déserteurs", d: "Capturer les membres en fuite." },
            { id: 9, cat: "Force", t: "Restriction / Confinement", d: "Mise aux arrêts ou en cellule." },
            { id: 15, cat: "Sanction", t: "Article 15 (NJP)", d: "Punitions administratives sans procès." },
            
            // --- ARTICLES PUNITIFS (77 - 134) ---

            { id: 85, cat: "Devoir", t: "Désertion", d: "Abandon de poste définitif ou devant l'ennemi." },
            { id: 86, cat: "Devoir", t: "AWOL", d: "Absence sans autorisation." },

            { id: 91, cat: "Insubordination", t: "Insubordination NCO", d: "Mépris envers un sous-officier." },
            { id: 92, cat: "Ordres", t: "Violation d'Ordre", d: "Désobéissance aux règlements." },

            { id: 106, cat: "Trahison", t: "Espionnage", d: "Collecte de secrets militaires." },

            { id: 108, cat: "Matériel", t: "Sabotage / Perte", d: "Destruction de biens de l'armée." },
            { id: 109, cat: "Matériel", t: "Dégâts biens privés", d: "Destruction de biens civils." },
            { id: 111, cat: "Véhicule", t: "Ivresse au volant", d: "Conduite sous alcool/drogue." },
            { id: 112, cat: "Service", t: "Ivresse au service", d: "Ivre pendant une garde ou mission." },
            { id: 112a, cat: "Drogue", t: "Stupéfiants", d: "Possession ou trafic de drogues." },
            { id: 113, cat: "Garde", t: "Faute de Sentinelle", d: "Garde endormi ou parti." },

            { id: 120a, cat: "Sexe", t: "Stalking (Harcèlement)", d: "Traque et harcèlement répété." },
            { id: 121, cat: "Vol", t: "Larceny", d: "Vol de biens." },
            { id: 122, cat: "Vol", t: "Braquage", d: "Vol avec violence." },
            { id: 123, cat: "Fraude", t: "Falsification", d: "Faux documents / Signatures." },
            { id: 123a, cat: "Fraude", t: "Chèques sans provision", d: "Fraude financière." },
            { id: 128, cat: "Violence", t: "Assault", d: "Coups et blessures." },
            { id: 131, cat: "Justice", t: "Parjure", d: "Mentir sous serment." },
            { id: 131b, cat: "Justice", t: "Obstruction", d: "Entraver une enquête." },
            { id: 133, cat: "Honneur", t: "Conduite d'Officier", d: "Acte indigne du rang." },

            // --- NOUVEAUX AJOUTS (Zéro retrait) ---
            { id: 105, cat: "Captivité", t: "Inconduite Prisonnier", d: "Trahison envers ses camarades détenus." },
            { id: 110, cat: "Marine", t: "Mise en danger de navire", d: "Action causant le naufrage ou risque maritime." },
            { id: 114, cat: "Désordre", t: "Duel", d: "Combats singuliers programmés." },
            { id: 115, cat: "Fraude", t: "Malingering", d: "Simuler une blessure pour éviter le front." },
            { id: 116, cat: "Désordre", t: "Émeute", d: "Participation à une révolte publique." },
            { id: 117, cat: "Désordre", t: "Paroles provocatrices", d: "Insultes visant à créer une bagarre." },
            { id: 124, cat: "Violence", t: "Mutilation", d: "Infliger des blessures permanentes." },
            { id: 126, cat: "Crime", t: "Incendie criminel", d: "Mise à feu de bâtiments." },
            { id: 127, cat: "Crime", t: "Extorsion", d: "Racket et chantage." },
            { id: 132, cat: "Fraude", t: "Fraude contre l'État", d: "Vol de fonds gouvernementaux." },
            { id: 138, cat: "Droit", t: "Plainte contre supérieur", d: "Recours pour injustice hiérarchique." },
            { id: 139, cat: "Civil", t: "Réparation dommages", d: "Paiement pour dégâts causés aux civils." }
        ];

        function display(articles) {
            const container = document.getElementById('articles-list');
            container.innerHTML = articles.map(a => `
                <div class="article-card" onclick="this.querySelector('.details').classList.toggle('active')">
                    <div class="flex justify-between items-center">
                        <div class="flex items-center gap-4">
                            <span class="font-mono text-blue-600 font-bold">#${a.id}</span>
                            <div>
                                <h2 class="text-white font-bold text-sm uppercase tracking-wide">${a.t}</h2>
                                <span class="text-[9px] bg-blue-900/30 text-blue-400 px-2 py-0.5 rounded uppercase font-bold">${a.cat}</span>
                            </div>
                        </div>
                        <i class="fas fa-chevron-down text-zinc-800 text-xs"></i>
                    </div>
                    <div class="details">
                        <p class="text-sm italic leading-relaxed text-zinc-400">"${a.d}"</p>
                    </div>
                </div>
            `).join('');
        }

        document.getElementById('search').addEventListener('input', (e) => {
            const val = e.target.value.toLowerCase();
            const filtered = db.filter(a => a.t.toLowerCase().includes(val) || a.id.toString().includes(val));
            display(filtered);
        });

        // Lancement immédiat
        display(db);
    </script>
</body>
</html>
