<!DOCTYPE html>

<head>

    <title>UCMJ | DATABASE COMPLETE | ZANCUDO</title>

    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&display=swap');
        
        body { background: #000000; color: #ffffff; font-family: 'Inter', sans-serif; }
        .article-card { background: #0a0a0a; border: 1px solid #1a1a1a; transition: all 0.2s; }
        .article-card:hover { border-color: #3b82f6; background: #0f172a; }
        .content-hidden { display: none; }
        .glow-text { text-shadow: 0 0 15px rgba(59, 130, 246, 0.5); }
        .category-header { color: #3b82f6; font-weight: 900; letter-spacing: 4px; border-bottom: 2px solid #1e293b; padding-bottom: 10px; margin-top: 50px; text-transform: uppercase; font-size: 0.75rem; }
    </style>
</head>
<body class="min-h-screen pb-20">

    <header class="p-10 border-b border-white/5 sticky top-0 bg-black/90 backdrop-blur-xl z-50">
        <div class="container mx-auto flex flex-col md:flex-row justify-between items-center gap-8">
            <div class="text-center md:text-left">
                <h1 class="text-3xl font-black tracking-tighter glow-text">ZANCUDO DIVISION</h1>
                <p class="text-[10px] text-white/30 tracking-[0.5em] uppercase mt-2 font-bold">Unified Code of Military Justice • Full Registry</p>
            </div>
            <div class="relative w-full max-w-xl">
                <input type="text" id="search" placeholder="RECHERCHER DANS L'INTEGRALITÉ DES 146 ARTICLES..." 
                       class="w-full bg-white/5 border border-white/10 rounded-none py-4 px-12 text-sm focus:border-blue-500 outline-none transition-all">
                <i class="fas fa-search absolute left-4 top-5 text-white/20"></i>
            </div>
        </div>
    </header>

    <main class="container mx-auto mt-10 px-6 max-w-5xl">
        <div id="full-database">
            </div>
    </main>

            { id: 137, c: "Dispositions Diverses", t: "Explications", d: "Obligation de lire l'UCMJ aux soldats périodiquement." },
            { id: 138, c: "Dispositions Diverses", t: "Plaintes", d: "Droit de porter plainte contre son supérieur pour tort." },
            { id: 139, c: "Dispositions Diverses", t: "Réparations", d: "Indemnisation pour dommages matériels causés par des militaires." },
            { id: 140, c: "Dispositions Diverses", t: "Pouvoir présidentiel", d: "Le Président définit les règles de preuve et de procédure." }
        ];

        const dbContainer = document.getElementById('full-database');
        const searchBox = document.getElementById('search');

        function generateUI(articles) {
            dbContainer.innerHTML = '';
            let lastCat = "";

            articles.forEach(art => {
                if(art.c !== lastCat) {
                    const h = document.createElement('div');
                    h.className = "category-header";
                    h.innerText = art.c;
                    dbContainer.appendChild(h);
                    lastCat = art.c;
                }

                const card = document.createElement('div');
                card.className = "article-card p-6 my-2 cursor-pointer";
                card.onclick = () => card.querySelector('.desc').classList.toggle('content-hidden');
                
                card.innerHTML = `
                    <div class="flex justify-between items-center">
                        <div class="flex items-center gap-6">
                            <span class="text-blue-500 font-bold w-12 text-sm italic">#${art.id}</span>
                            <h2 class="font-bold text-xs md:text-sm uppercase tracking-widest text-white/90">${art.t}</h2>
                        </div>
                        <i class="fas fa-chevron-right text-white/10 text-xs"></i>
                    </div>
                    <div class="desc content-hidden mt-6 pt-6 border-t border-white/5 text-white/40 text-xs leading-relaxed italic">
                        "${art.d}"
                    </div>
                `;
                dbContainer.appendChild(card);
            });
        }

        searchBox.addEventListener('input', (e) => {
            const query = e.target.value.toLowerCase();
            const filtered = ucmjDatabase.filter(a => 
                a.t.toLowerCase().includes(query) || 
                a.id.toString().includes(query) ||
                a.d.toLowerCase().includes(query)
            );
            generateUI(filtered);
        });

        generateUI(ucmjDatabase);
    </script>
</body>
</html>
