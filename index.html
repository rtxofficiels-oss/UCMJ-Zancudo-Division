<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZANCUDO DIVISION | UCMJ ARCHIVES</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Roboto+Mono:wght@300;400;700&display=swap');
        
        :root { --mil-gold: #c5a059; --mil-olive: #3d4430; }
        body { background-color: #05070a; color: #d1d5db; font-family: 'Roboto Mono', monospace; }
        .font-title { font-family: 'Orbitron', sans-serif; }
        .glass-panel { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(197, 160, 89, 0.2); }
        .sidebar-link:hover { background: rgba(197, 160, 89, 0.1); color: var(--mil-gold); border-right: 3px solid var(--mil-gold); }
        .active-cat { background: rgba(197, 160, 89, 0.2); color: var(--mil-gold); border-right: 3px solid var(--mil-gold); }
        
        /* Animation de scan line */
        .scanline { width: 100%; height: 2px; background: rgba(197, 160, 89, 0.1); position: absolute; animation: scan 4s linear infinite; }
        @keyframes scan { from { top: 0; } to { top: 100%; } }
    </style>
</head>
<body class="flex h-screen overflow-hidden">

    <aside class="w-72 glass-panel border-r border-amber-900/30 flex flex-col z-20">
        <div class="p-6 border-b border-amber-900/30 relative overflow-hidden">
            <div class="scanline"></div>
            <h1 class="font-title text-xl font-bold text-amber-500 tracking-tighter">ZANCUDO</h1>
            <p class="text-[10px] text-amber-700 font-bold tracking-[4px]">DIVISION UCMJ</p>
        </div>
        
        <div class="p-4">
            <input type="text" id="searchArt" placeholder="SEARCH CODES..." 
                   class="w-full bg-black/50 border border-amber-900/50 rounded p-2 text-xs focus:outline-none focus:border-amber-500 text-amber-500">
        </div>

        <nav class="flex-1 overflow-y-auto" id="navMenu">
            <button onclick="displayAll()" class="sidebar-link w-full text-left p-4 text-xs font-bold uppercase transition">
                <i class="fas fa-database mr-2"></i> All Archives
            </button>
            </nav>

        <div class="p-4 text-[9px] text-amber-900 border-t border-amber-900/20 font-bold">
            RESTRICTED ACCESS - LEVEL 4 REQUIRED
        </div>
    </aside>

    <main class="flex-1 flex flex-col relative">
        <div class="absolute inset-0 opacity-5 pointer-events-none" 
             style="background-image: url('https://www.transparenttextures.com/patterns/carbon-fibre.png');"></div>

        <header class="h-16 flex items-center justify-between px-8 border-b border-amber-900/20 bg-black/20">
            <div class="flex items-center space-x-4">
                <span class="text-xs text-amber-600/50"><i class="fas fa-terminal mr-2"></i>SYSTEM_ID: AR700-1</span>
                <span id="breadcrumb" class="text-xs font-bold text-amber-500 uppercase tracking-widest">/ MAIN_DATABASE</span>
            </div>
            <div id="clock" class="text-xs font-bold text-amber-600"></div>
        </header>

        <div id="contentArea" class="flex-1 overflow-y-auto p-8 grid grid-cols-1 md:grid-cols-2 gap-6 content-start">
            </div>
    </main>

    <script src="ucmj_data.js"></script>
    <script>
        const contentArea = document.getElementById('contentArea');
        const navMenu = document.getElementById('navMenu');

        // Initialisation
        function init() {
            displayArticles(ucmjDatabase);
            generateCategories();
            updateClock();
            setInterval(updateClock, 1000);
        }

        function updateClock() {
            const now = new Date();
            document.getElementById('clock').innerText = now.toISOString().replace('T', ' ').substring(0, 19) + ' Z';
        }

        function generateCategories() {
            const cats = [...new Set(ucmjDatabase.map(a => a.cat))];
            cats.forEach(cat => {
                const btn = document.createElement('button');
                btn.className = "sidebar-link w-full text-left p-4 text-[11px] uppercase transition border-b border-white/5 text-slate-400";
                btn.innerHTML = `<i class="fas fa-chevron-right mr-2 text-[8px]"></i> ${cat}`;
                btn.onclick = () => filterCat(cat);
                navMenu.appendChild(btn);
            });
        }

        function displayArticles(data) {
            contentArea.innerHTML = '';
            data.forEach(art => {
                contentArea.innerHTML += `
                    <div class="glass-panel p-6 rounded-sm border-l-4 border-amber-600 hover:bg-amber-900/5 transition group">
                        <div class="flex justify-between items-start mb-4">
                            <span class="bg-amber-600 text-black px-2 py-0.5 text-[10px] font-bold">ART. ${art.id}</span>
                            <span class="text-[9px] text-amber-700 font-bold uppercase tracking-tighter">Part ${art.part} // ${art.cat}</span>
                        </div>
                        <h3 class="font-title text-sm font-bold text-white mb-3 tracking-wide group-hover:text-amber-500">${art.title}</h3>
                        <p class="text-xs leading-relaxed text-slate-400 font-light border-t border-white/5 pt-3">
                            ${art.text}
                        </p>
                    </div>
                `;
            });
        }

        function filterCat(cat) {
            const filtered = ucmjDatabase.filter(a => a.cat === cat);
            document.getElementById('breadcrumb').innerText = `/ ${cat.toUpperCase()}`;
            displayArticles(filtered);
        }

        function displayAll() {
            document.getElementById('breadcrumb').innerText = `/ MAIN_DATABASE`;
            displayArticles(ucmjDatabase);
        }

        // Recherche en temps réel
        document.getElementById('searchArt').addEventListener('input', (e) => {
            const val = e.target.value.toLowerCase();
            const filtered = ucmjDatabase.filter(a => 
                a.title.toLowerCase().includes(val) || 
                a.text.toLowerCase().includes(val) ||
                a.id.toString().includes(val)
            );
            displayArticles(filtered);
        });

        init();
    </script>
</body>
</html>
